{% extends 'main/base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4 shadow-lg bg-dark text-white border-info">
                <h2 class="text-info mb-4">🎣 Dodaj nowy połów</h2>
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-info fw-bold">Zapisz w dzienniku</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
