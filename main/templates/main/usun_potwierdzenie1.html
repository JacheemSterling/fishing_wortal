{% extends 'main/base.html' %}

{% block content %}
<div class="container mt-5 text-center">
    <div class="card bg-dark border-danger shadow p-5 mx-auto" style="max-width: 500px;">
        <h2 class="text-danger mb-4">Czy na pewno?</h2>
        <p class="text-white">Czy na pewno chcesz usunąć połów: <strong>{{ polow.gatunek_ryby }}</strong>?</p>
        <p class="text-muted small text-uppercase">Tej operacji nie można cofnąć.</p>
        
        <form method="post">
            {% csrf_token %}
            <div class="mt-4">
                <button type="submit" class="btn btn-danger px-4 me-2">Tak, usuń</button>
                <a href="{% url 'lista_polowow' %}" class="btn btn-secondary px-4">Anuluj</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
